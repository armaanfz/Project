<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Magnifier – A web app to help students read small text more comfortably with zoom, color filters, and a focus mask. Built for partially visually impaired students.">
    <title>Magnifier</title>
    <link rel="icon" type="image/png" href="{{ url_for('static', filename='images/favicon.png') }}">
    <!-- G: restore saved accent colour before CSS loads to avoid flash of default colour -->
    <script>
    (function(){
        try {
            var c = localStorage.getItem('magnifier_accent');
            if (c && /^#[0-9a-fA-F]{6}$/.test(c)) {
                document.documentElement.style.setProperty('--accent-color', c);
                var r=parseInt(c.slice(1,3),16), g=parseInt(c.slice(3,5),16), b=parseInt(c.slice(5,7),16);
                document.documentElement.style.setProperty('--accent-color-rgb', r+','+g+','+b);
            }
        } catch(e) { if (e.name !== 'SecurityError') console.warn('localStorage error:', e); }
    })();
    </script>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/styles.css') }}">
</head>
<body>
<nav>
    <div class="container">
        <h1>MAGNIFIER</h1>
        <ul>
            <li><a href="#" data-tab="home">Home</a></li>
            <li><a href="#" data-tab="team">Team</a></li>
            <li><a href="#" data-tab="about">About</a></li>
        </ul>
    </div>
</nav>

<div class="page-layout">
    <main class="content-panel" id="info-box" aria-live="polite"></main>

    <aside class="quick-start" aria-label="Quick start">
        <h2>Ready to Read?</h2>
        <p>When you are ready, click the button below to start using the Magnifier.</p>
        <button class="start-btn" id="start-samples-btn" data-samples-url="{{ url_for('samples') }}">Start Magnifier</button>
        <button class="start-btn" id="start-remote-btn" data-remote-url="{{ url_for('remote') }}">Access Remote Stream</button>
        <div class="accent-picker-row">
            <label for="accent-picker" class="accent-picker-label">Theme colour</label>
            <input type="color" id="accent-picker" value="#ffd700" aria-label="Choose theme accent colour">
            <button type="button" id="accent-reset-btn" class="accent-reset-btn" aria-label="Reset theme colour to default">Reset</button>
        </div>
        <div id="tunnel-box" aria-live="polite">
            <p class="tunnel-label">Remote Access URL</p>
            <p id="tunnel-url-text">Starting tunnel...</p>
            <button type="button" id="tunnel-copy-btn" style="display:none" aria-label="Copy remote access URL">Copy URL</button>
        </div>
        <button type="button" class="shutdown-btn" id="shutdown-btn" aria-label="Shut down Raspberry Pi">Shut Down</button>
    </aside>
</div>

<script>
(function() {
  async function shutdownPi() {
    if (!confirm("Are you sure you want to shut down the Raspberry Pi?")) return;

    const btn = document.getElementById("shutdown-btn");
    btn.disabled = true;
    btn.textContent = "Shutting down...";

    try {
      const res = await fetch("/shutdown", {
        method: "POST"
      });
      if (!res.ok) {
        btn.disabled = false;
        btn.textContent = "Shut Down";
        const message = res.status === 403
          ? "Shutdown is only available from the Raspberry Pi itself."
          : res.status === 429
            ? "Shutdown was requested recently. Please wait a moment and try again."
            : "Server returned " + res.status + ".";
        alert("Shutdown failed: " + message);
        return;
      }
      btn.textContent = "✅ Shutdown initiated";
    } catch (e) {
      btn.disabled = false;
      btn.textContent = "Shut Down";
      alert("Shutdown failed: unable to reach the server.");
    }
  }

  document.getElementById("shutdown-btn").addEventListener("click", shutdownPi);
})();

(function() {
  var tunnelUrlText = document.getElementById('tunnel-url-text');
  var tunnelCopyBtn = document.getElementById('tunnel-copy-btn');

  function pollTunnel() {
    fetch('/tunnel-status')
      .then(function(res) { return res.json(); })
      .then(function(data) {
        if (data.status === 'ready') {
          var a = document.createElement('a');
          a.href = data.url;
          a.textContent = data.url;
          a.target = '_blank';
          a.rel = 'noopener noreferrer';
          tunnelUrlText.replaceChildren(a);
          tunnelCopyBtn.style.display = 'block';
        } else if (data.status === 'error') {
          tunnelUrlText.textContent = 'Tunnel unavailable';
        } else {
          setTimeout(pollTunnel, 2000);
        }
      })
      .catch(function() {
        setTimeout(pollTunnel, 2000);
      });
  }

  tunnelCopyBtn.addEventListener('click', function() {
    var anchor = tunnelUrlText.querySelector('a');
    if (anchor) {
      navigator.clipboard.writeText(anchor.href).then(function() {
        tunnelCopyBtn.textContent = 'Copied!';
        setTimeout(function() { tunnelCopyBtn.textContent = 'Copy URL'; }, 1500);
      });
    }
  });

  pollTunnel();
})();
</script>

<div id="tab-content-source" hidden>
    {% include "home_tab_content.html" %}
</div>

<script defer src="{{ url_for('static', filename='js/script.js') }}"></script>
<script>
(function () {
    var DEFAULT_ACCENT = '#ffd700';
    var STORAGE_KEY    = 'magnifier_accent';

    function hexToRgb(hex) {
        return parseInt(hex.slice(1,3),16)+','+parseInt(hex.slice(3,5),16)+','+parseInt(hex.slice(5,7),16);
    }

    function applyAccent(hex) {
        document.documentElement.style.setProperty('--accent-color', hex);
        document.documentElement.style.setProperty('--accent-color-rgb', hexToRgb(hex));
    }

    var picker   = document.getElementById('accent-picker');
    var resetBtn = document.getElementById('accent-reset-btn');

    if (picker) {
        var saved = null;
        try { saved = localStorage.getItem(STORAGE_KEY); } catch(_) {}
        if (saved && /^#[0-9a-fA-F]{6}$/.test(saved)) {
            picker.value = saved;
            applyAccent(saved);
        }

        picker.addEventListener('input', function () {
            applyAccent(picker.value);
            try { localStorage.setItem(STORAGE_KEY, picker.value); } catch(_) {}
        });
    }

    if (resetBtn) {
        resetBtn.addEventListener('click', function () {
            applyAccent(DEFAULT_ACCENT);
            if (picker) picker.value = DEFAULT_ACCENT;
            try { localStorage.removeItem(STORAGE_KEY); } catch(_) {}
        });
    }
})();
</script>
</body>
</html>
