<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Remote view of the Magnifier camera stream.">
    <title>Magnifier – Remote View</title>
    <link rel="icon" type="image/png" href="{{ url_for('static', filename='images/favicon.png') }}">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/samples.css') }}">
    <style>
        /* Remote-specific overrides */
        #stream-img {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 100vw;
            height: 100vh;
            object-fit: cover;
        }
        #remote-badge {
            position: fixed;
            top: 20px;
            right: 20px;
            background: rgba(0,0,0,0.7);
            color: #ffd700;
            border: 1px solid #ffd700;
            border-radius: 8px;
            padding: 6px 14px;
            font-size: 14px;
            z-index: 300;
            pointer-events: none;
        }
    </style>
</head>
<body>
    <!-- SVG color-blindness filters (same as samples.html) -->
    <svg xmlns="http://www.w3.org/2000/svg"
         style="position:absolute;width:0;height:0;overflow:hidden"
         aria-hidden="true" focusable="false">
        <defs>
            <filter id="filter-protanopia">
                <feColorMatrix type="matrix" values="
                    0.152  1.053 -0.205  0  0
                    0.115  0.786  0.099  0  0
                   -0.004 -0.048  1.052  0  0
                    0      0      0      1  0"/>
            </filter>
            <filter id="filter-deuteranopia">
                <feColorMatrix type="matrix" values="
                    0.367  0.861 -0.228  0  0
                    0.280  0.673  0.047  0  0
                   -0.012  0.043  0.969  0  0
                    0      0      0      1  0"/>
            </filter>
            <filter id="filter-tritanopia">
                <feColorMatrix type="matrix" values="
                    1.256 -0.077 -0.179  0  0
                   -0.078  0.931  0.148  0  0
                    0.005  0.691  0.304  0  0
                    0      0      0      1  0"/>
            </filter>
        </defs>
    </svg>

    <span id="remote-badge"> Live – Remote View</span>

    <div id="video-container">
        <!-- MJPEG stream rendered as an img; CSS filters are applied via JS below -->
        <img id="stream-img"
             src="{{ url_for('video_feed') }}"
             alt="Live camera stream"
             aria-label="Live camera stream from Raspberry Pi">

        <div id="controls">
            <button class="btn" id="filter-button" aria-label="Open filters menu">Filters</button>
        </div>
    </div>

    <!-- Filter menu (identical structure to samples.html) -->
    <div id="menu">
        <div id="filter-list">
            <h3>Predefined Filters</h3>
            <div class="scrollable">
                <button class="filter-btn" data-filter="normal"             aria-label="Normal colors">Normal</button>
                <button class="filter-btn" data-filter="protanopia"         aria-label="Protanopia">PT</button>
                <button class="filter-btn" data-filter="deuteranopia"       aria-label="Deuteranopia">DT</button>
                <button class="filter-btn" data-filter="tritanopia"         aria-label="Tritanopia">TT</button>
                <button class="filter-btn" data-filter="grayscale"          aria-label="Grayscale">Grayscale</button>
                <button class="filter-btn" data-filter="inverted"           aria-label="Inverted">Inverted</button>
                <button class="filter-btn" data-filter="inverted-grayscale" aria-label="Inverted Grayscale">Inverted Grayscale</button>
                <button class="filter-btn" data-filter="blue-on-yellow"     aria-label="Blue on Yellow">Blue on Yellow</button>
                <button class="filter-btn" data-filter="orange-on-black"    aria-label="Orange on Black">Orange on Black</button>
                <button class="filter-btn" data-filter="green-on-black"     aria-label="Green on Black">Green on Black</button>
                <button class="filter-btn" data-filter="yellow-on-black"    aria-label="Yellow on Black">Yellow on Black</button>
                <button class="filter-btn" data-filter="purple-on-black"    aria-label="Purple on Black">Purple on Black</button>
            </div>
            <div class="custom-filter">
                <h3>Adjustable Filters</h3>
                <div class="custom-slider-group">
                    <div class="custom-slider-col">
                        <label for="hue">Hue</label>
                        <input type="range" id="hue" min="0" max="360" value="0" aria-label="Hue">
                    </div>
                    <div class="custom-slider-col">
                        <label for="brightness">Brightness</label>
                        <input type="range" id="brightness" min="0" max="200" value="100" aria-label="Brightness">
                    </div>
                    <div class="custom-slider-col">
                        <label for="contrast">Contrast</label>
                        <input type="range" id="contrast" min="0" max="200" value="100" aria-label="Contrast">
                    </div>
                    <div class="custom-slider-col">
                        <label for="saturation">Saturation</label>
                        <input type="range" id="saturation" min="0" max="200" value="100" aria-label="Saturation">
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
    (function () {
        const streamImg = document.getElementById('stream-img');
        const menu      = document.getElementById('menu');

        // ── Filter state ────────────────────────────────────────────────────
        let currentFilter = 'none';
        const custom = { hue: 0, brightness: 100, contrast: 100, saturation: 100 };

        function applyFilters() {
            const pre = currentFilter !== 'none' ? currentFilter : '';
            const adj = `hue-rotate(${custom.hue}deg) brightness(${custom.brightness}%) contrast(${custom.contrast}%) saturate(${custom.saturation}%)`;
            streamImg.style.filter = `${pre} ${adj}`.trim();
        }

        // ── Predefined filter map ───────────────────────────────────────────
        const filterMap = {
            'normal':             'none',
            'protanopia':         'url(#filter-protanopia)',
            'deuteranopia':       'url(#filter-deuteranopia)',
            'tritanopia':         'url(#filter-tritanopia)',
            'grayscale':          'grayscale(100%)',
            'inverted':           'invert(100%)',
            'inverted-grayscale': 'grayscale(100%) invert(100%)',
            'blue-on-yellow':     'sepia(100%) hue-rotate(180deg) saturate(300%) brightness(50%)',
            'orange-on-black':    'invert(100%) sepia(100%) saturate(500%) hue-rotate(330deg) brightness(50%) contrast(200%)',
            'green-on-black':     'invert(100%) sepia(100%) saturate(500%) hue-rotate(90deg) brightness(50%) contrast(200%)',
            'yellow-on-black':    'invert(100%) brightness(80%) contrast(200%) sepia(100%) hue-rotate(60deg)',
            'purple-on-black':    'invert(100%) brightness(70%) contrast(200%) sepia(100%) hue-rotate(300deg)'
        };

        document.querySelectorAll('.filter-btn[data-filter]').forEach(btn => {
            btn.addEventListener('click', () => {
                const key = btn.dataset.filter;
                currentFilter = filterMap[key] ?? 'none';
                applyFilters();
            });
        });

        // ── Adjustable sliders ──────────────────────────────────────────────
        ['hue', 'brightness', 'contrast', 'saturation'].forEach(id => {
            const el = document.getElementById(id);
            if (!el) return;
            el.addEventListener('input', () => {
                custom[id] = el.value;
                applyFilters();
            });
        });

        // ── Filter menu toggle ──────────────────────────────────────────────
        document.getElementById('filter-button')
            ?.addEventListener('click', () => menu.classList.toggle('active'));
    })();
    </script>
</body>
</html>
